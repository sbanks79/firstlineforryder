<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Firstline Road Solutions — Call Taking Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #1a2e6e;
      --navy-light: #e8ecf8;
      --red:        #cc2027;
      --bg:         #f4f6fb;
      --card-bg:    #ffffff;
      --card-border:#dde2f0;
      --text:       #1a1f2e;
      --muted:      #6b7394;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(26,46,110,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 100%, rgba(204,32,39,0.05) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 20px 40px;
      box-shadow: 0 2px 20px rgba(26,46,110,0.12), 0 1px 4px rgba(0,0,0,0.06);
      display: inline-block;
      border: 1px solid var(--card-border);
    }

    .logo-wrap img { height: 72px; display: block; }

    .tagline {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      max-width: 860px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--card-border), transparent);
      margin-bottom: 40px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 22px;
      text-align: center;
    }

    /* ── ACCOUNT GRID ── */
    .account-grid {
      width: 100%;
      max-width: 720px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 560px) {
      .account-grid { grid-template-columns: 1fr; }
    }

    .account-link {
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px 28px;
      box-shadow: 0 4px 24px rgba(26,46,110,0.09), 0 1px 4px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }

    .account-link:hover {
      transform: translateY(-3px);
      border-color: var(--navy);
      box-shadow: 0 10px 34px rgba(26,46,110,0.16), 0 2px 6px rgba(0,0,0,0.05);
    }

    .account-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .account-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      flex-shrink: 0;
    }
    .account-icon.ryder { background: linear-gradient(135deg, #f5a623, #f7c048); box-shadow: 0 4px 12px rgba(245,166,35,0.3); }
    .account-icon.ups   { background: linear-gradient(135deg, #4a3210, #6b4a17); box-shadow: 0 4px 12px rgba(107,74,23,0.3); }

    .account-info h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .account-info p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .account-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
      border-top: 1px solid #f0f2f8;
      padding-top: 16px;
    }
    .account-cta .arrow { transition: transform 0.18s; }
    .account-link:hover .account-cta .arrow { transform: translateX(4px); }

    /* ── FOOTER ── */
    footer {
      margin-top: 56px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <img src="https://firstlineroad.com/wp-content/uploads/2023/10/FL_LandingLogo-v2.png" alt="Firstline Road Solutions"/>
    </div>
    <p class="tagline">Call Taking Portal</p>
  </header>

  <div class="divider"></div>

  <p class="section-label">Select an Account</p>

  <div class="account-grid">

    <a class="account-link" href="ryderwest.html">
      <div class="account-top">
        <div class="account-icon ryder">🚛</div>
        <div class="account-info">
          <h2>Ryder West</h2>
          <p>California &mdash; 41 locations</p>
        </div>
      </div>
      <div class="account-cta">
        <span>Open portal</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <a class="account-link" href="upswest.html">
      <div class="account-top">
        <div class="account-icon ups">📦</div>
        <div class="account-info">
          <h2>UPS West</h2>
          <p>CA / NV / WA &mdash; 35 locations</p>
        </div>
      </div>
      <div class="account-cta">
        <span>Open portal</span>
        <span class="arrow">→</span>
      </div>
    </a>

  </div>

  <footer>&copy; 2026 Firstline Road Solutions &mdash; Internal Use Only</footer>

</body>
</html>
